<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Truthpaste tour dates and ticket links.">
  <title>Truthpaste — Tour</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .tour-page {
      min-height: 100dvh;
      border: 1px solid var(--color-border);
      padding: var(--space-6) var(--space-8);
      position: relative;
    }

    .tour-header {
      position: fixed;
      top: var(--space-6);
      left: var(--space-8);
      right: var(--space-8);
      display: flex;
      align-items: var(--header-align-items);
      justify-content: var(--header-justify-content);
      gap: var(--header-gap);
      flex-wrap: wrap;
      z-index: 10;
    }

    .tour-logo {
      width: var(--logo-width);
      margin-top: var(--logo-offset-y);
      height: auto;
      user-select: none;
      -webkit-user-drag: none;

      /*
       * Layered drop-shadow blur — follows the PNG alpha channel contours,
       * not the bounding box. Each layer adds radius: tight inner glow,
       * mid halo, soft outer bloom. Opacity is tuned so the effect reads
       * as atmospheric rather than heavy.
       *
       * drop-shadow(offset-x offset-y blur-radius color)
       * All offsets are 0 so the glow spreads uniformly around each letterform.
       */
      filter:
        drop-shadow(0 0 3px  rgba(255, 255, 255, 0.95))   /* tight letter-edge glow  */
        drop-shadow(0 0 14px  rgba(255, 255, 255, 0.70))   /* mid halo                */
        drop-shadow(0 0 35px rgba(255, 255, 255, 0.45))   /* soft bloom              */
        drop-shadow(0 0 60px rgba(255, 255, 255, 0.20));  /* distant atmospheric fade */
    }

    .tour-jester {
      width: var(--logo-jester-width);
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .tour-home-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .tour-back-link {
      font-family: var(--font-nav);
      font-size: var(--nav-font-size);
      letter-spacing: var(--nav-letter-spacing);
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    .tour-widget-wrap {
      width: min(100%, 1300px);
      margin: calc(var(--space-6) + 120px) auto 0;
      font-family: var(--font-nav);
      position: relative;
      z-index: 2;
    }

    .widget-font-probe {
      font-family: var(--font-nav);
      font-size: 1px;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 1300px) {
      .tour-page {
        padding: var(--space-6) var(--space-4);
      }

      .tour-header {
        left: var(--space-4);
        right: var(--space-4);
      }

      .tour-widget-wrap {
        margin-top: calc(var(--space-6) + 110px);
      }
    }
  </style>
</head>
<body>
  <div class="tour-page">
    <header class="tour-header">
      <a href="../index.html" aria-label="Truthpaste home">
        <img
          src="../assets/images/logo.png"
          alt="Truthpaste"
          class="tour-logo"
          width="480"
          height="auto"
          fetchpriority="high"
        >
      </a>
      <div class="tour-home-stack">
        <img
          src="../assets/images/jester.png"
          alt=""
          class="tour-jester"
          width="84"
          height="84"
          loading="eager"
          draggable="false"
        >
        <a href="../index.html" class="tour-back-link" aria-label="Back to home">home</a>
      </div>
    </header>

    <main class="tour-widget-wrap" aria-label="Songkick tour dates">
      <span class="widget-font-probe" aria-hidden="true">WonderType</span>
      <a
        href="https://www.songkick.com/artists/10389020"
        class="songkick-widget"
        data-theme="light"
        data-track-button="on"
        data-detect-style="off"
        data-background-color="rgb(255,255,255,1)"
        data-font-color="rgb(0,0,0,1)"
        data-button-bg-color="rgb(0,0,0,1)"
        data-button-text-color="rgb(255,255,255,1)"
        data-locale="en"
        data-other-artists="on"
        data-share-button="on"
        data-country-filter="on"
        data-rsvp="on"
        data-request-show="on"
        data-past-events="off"
        data-past-events-offtour="off"
        data-remind-me="off"
        style="display: none;"
      ></a>

    </main>
  </div>

  <aside class="social-links" aria-label="Truthpaste social media">
    <a href="https://www.instagram.com/truthpa5te" class="social-link" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-instagram" aria-hidden="true"></i>
    </a>
    <a href="https://www.tiktok.com/@truthpa5te" class="social-link" aria-label="TikTok" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
    </a>
    <a href="https://www.youtube.com/@Truthpa5te" class="social-link" aria-label="YouTube" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-youtube" aria-hidden="true"></i>
    </a>
    <a href="https://open.spotify.com/artist/1jX7jSANud3GSSMfs41KPs?si=TrGTXNKgTCeVXbcR6bNRUA" class="social-link" aria-label="Spotify" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-spotify" aria-hidden="true"></i>
    </a>
  </aside>

  <script src="https://widget-app.songkick.com/injector/10389020"></script>
</body>
</html>
